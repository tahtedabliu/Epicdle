<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>EPICDLE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>
  
<!-- MENU -->
<div id="menu">
<h1>EPICDLE</h1>

<button onclick="abrirModo('musica')">🎵 Modo Música</button>
<button onclick="abrirSobre()">📖 Sobre</button>
<button onclick="abrirFeedback()">💬 Feedback</button>
</div>
  
<div class="container">

<h1>EPICDLE</h1>

<p id="mensagem"></p>

<p id="tentativas">Tentativas: 0</p>
<p id="timer"></p>


<input type="text" id="guess" placeholder="Digite o personagem">

<div id="sugestoes"></div>

<button id="botaoTentar" onclick="verificar()">Tentar</button>

<table id="tabela">
<tr>
<th>Imagem</th>
<th>Nome</th>
<th>Status</th>
<th>Espécie</th>
<th>Gênero</th>
<th>Pseudônimo</th>
<th>Saga</th>
</tr>
</table>

<div id="vitoria" style="display:none">

<h2>🎉 Você acertou!</h2>

<img id="imagemVitoria">

<h3 id="nomeVitoria"></h3>
<p id="pseudoVitoria"></p>

<button id="compartilharBtn" onclick="compartilhar()">
Compartilhar resultado
</button>

</div>

</div>

<script src="script.js"><div id="sobre" style="display:none">
<h2>Sobre</h2>
<p>Inspirado no Wordle</p>
<button onclick="voltarMenu()">Voltar</button>
</div>

<div id="feedback" style="display:none">
<textarea id="msgFeedback"></textarea>
<button onclick="enviarFeedback()">Enviar</button>
<button onclick="voltarMenu()">Voltar</button>
  </div></script>
<div class="container" id="jogoMusica" style="display:none">

<h2>Modo Música</h2>

<p id="tentativasMusica">Tentativas: 0</p>
<p id="timerMusica"></p>

<pre id="trechoMusica"></pre>
<p id="dicaMusica"></p>

<input type="text" id="guessMusica">
<div id="sugestoesMusica"></div>

<button onclick="verificarMusica()">Tentar</button>

<table id="tabelaMusica">
<tr><th>Música</th></tr>
</table>

<div id="resultadoMusica" style="display:none">
<h2>🎉 Acertou!</h2>
<img id="capaMusica">
<h3 id="nomeMusica"></h3>
</div>

<button onclick="compartilharMusica()">Compartilhar</button>
<button onclick="voltarMenu()">⬅ Voltar</button>

</div>
  
</body>
</html>
