<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>EPICdle</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>⚔ EPICdle</h1>

<p id="mensagem"></p>

<p id="tentativas">Tentativas: 0</p>
<p id="timer"></p>

<img id="imagem" class="sombra">

<input type="text" id="guess" placeholder="Digite o personagem">

<div id="sugestoes"></div>

<button onclick="verificar()">Tentar</button>

<table id="tabela">
<tr>
<th>Nome</th>
<th>Status</th>
<th>Espécie</th>
<th>Gênero</th>
<th>Pseudônimo</th>
<th>Saga</th>
</tr>
</table>

<div id="vitoria" style="display:none">

<h2>🎉 Você acertou!</h2>

<img id="imagemVitoria">

<h3 id="nomeVitoria"></h3>
<p id="pseudoVitoria"></p>

<button onclick="compartilhar()">Compartilhar resultado</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
